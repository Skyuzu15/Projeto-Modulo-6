# =============================================================
# Docker Compose — Projeto Módulo 5
# Inicie com: docker compose up --build
# =============================================================

services:

  # ---- MySQL ------------------------------------------------
  mysql:
    image: mysql:8.0
    container_name: projeto_mysql
    restart: unless-stopped
    env_file: .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE:      ${MYSQL_DATABASE}
      MYSQL_USER:          ${MYSQL_USER}
      MYSQL_PASSWORD:      ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/database.sql:/docker-entrypoint-initdb.d/database.sql:ro
    networks:
      - backend_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ---- Backend (Node.js / Express / TypeScript) -------------
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: projeto_backend
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV:      production
      PORT:          ${PORT}
      JWT_SECRET:    ${JWT_SECRET}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN}
      DB_HOST:       ${DB_HOST}
      DB_PORT:       ${DB_PORT}
      DB_NAME:       ${DB_NAME}
      DB_USER:       ${DB_USER}
      DB_PASSWORD:   ${DB_PASSWORD}
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - backend_net
    # Porta NÃO exposta ao host — apenas acessível pelo Nginx via rede interna

  # ---- Frontend (React → build estático servido pelo Nginx) -
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        REACT_APP_API_URL: /api
    container_name: projeto_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - frontend_net
    # Porta NÃO exposta ao host — servida pelo Nginx

  # ---- Nginx (Reverse Proxy + HTTPS + Segurança) ------------
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    container_name: projeto_nginx
    restart: unless-stopped
    ports:
      - "80:80"       # Redireciona para HTTPS
      - "443:443"     # HTTPS (único ponto de entrada público)
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - frontend
      - backend
    networks:
      - frontend_net
      - backend_net

# ---- Networks -----------------------------------------------
networks:
  frontend_net:
    driver: bridge
    name: projeto_frontend_net
  backend_net:
    driver: bridge
    name: projeto_backend_net

# ---- Volumes ------------------------------------------------
volumes:
  mysql_data:
    driver: local
    name: projeto_mysql_data
