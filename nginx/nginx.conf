# ============================================================
# Nginx — Reverse Proxy com HTTPS e cabeçalhos de segurança
# ============================================================

# Redireciona todo tráfego HTTP → HTTPS
server {
    listen 80;
    server_name localhost;

    return 301 https://$host$request_uri;
}

# Servidor HTTPS principal
server {
    listen 443 ssl;
    server_name localhost;

    # ---- Certificados TLS ----
    ssl_certificate     /etc/nginx/certs/cert.pem;
    ssl_certificate_key /etc/nginx/certs/key.pem;

    # Protocolos e cifras seguras
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ---- Cabeçalhos de Segurança ----

    # Impede que a página seja carregada em <iframe> de outros domínios (proteção contra clickjacking)
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Impede que o browser "adivinhe" o tipo MIME do conteúdo (MIME sniffing)
    add_header X-Content-Type-Options "nosniff" always;

    # Controla quanta informação de origem (Referer) é enviada ao navegar entre páginas
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Define quais recursos o browser pode carregar e de onde (proteção contra XSS e injeção)
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self';" always;

    # Ativa o filtro XSS embutido em browsers legados
    add_header X-XSS-Protection "1; mode=block" always;

    # Força HTTPS por 1 ano (HSTS)
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ---- Frontend (React SPA) ----
    location / {
        proxy_pass         http://frontend:80;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ---- Backend API (Node.js/Express) ----
    # O backend NÃO fica exposto diretamente; apenas o Nginx acessa.
    location /api/ {
        proxy_pass         http://backend:3001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_connect_timeout 10s;
    }
}
